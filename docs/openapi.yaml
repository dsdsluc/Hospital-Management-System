openapi: 3.0.3
info:
  title: Hospital Management System API
  version: 0.1.0
servers:
  - url: http://localhost:3000
paths:
  /api/auth/register:
    post:
      summary: Register a patient account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 8
                name:
                  type: string
                dob:
                  type: string
                  format: date
                gender:
                  type: string
                  enum: [MALE, FEMALE, OTHER]
                contact:
                  type: string
              required: [email, password, name]
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
        '409':
          description: Email already registered
        '422':
          description: Invalid payload
  /api/auth/callback/credentials:
    post:
      summary: Login with credentials
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                csrfToken:
                  type: string
                email:
                  type: string
                  format: email
                password:
                  type: string
              required: [email, password]
      responses:
        '302':
          description: Redirects on success
